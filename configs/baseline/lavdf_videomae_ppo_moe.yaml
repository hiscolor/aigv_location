# ============================================================================
# PPO + Role-aware MoE config
# Full pipeline: coarse localization → PPO refinement with MoE state enhancement
# ============================================================================

dataset_name: lavdf_videomae
train_split: ['train']
val_split: ['dev']
test_split: ['test']
dataset: {
  json_file: /home/lby/data/npy/metadata.min.json,
  feat_folder: /home/lby/data/npy/npy_features,
  file_prefix: null,
  file_ext: .npy,
  audio_feat_folder: null,
  audio_file_ext: null,
  num_classes: 1,
  input_dim: 1408,
  audio_input_dim: 0,
  feat_stride: 1,
  num_frames: 1,
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 768,
  force_upsampling: True,
}

model_name: LocPointTransformer
model: {
  backbone_type: convTransformer,
  fpn_type: identity,
  backbone_arch: [2, 2, 5],
  scale_factor: 2,
  max_buffer_len_factor: 1.0,
  n_mha_win_size: [7, 7, 7, 7, 7, -1],
  n_head: 4,
  embd_kernel_size: 3,
  embd_dim: 256,
  embd_with_ln: True,
  fpn_dim: 256,
  fpn_with_ln: True,
  fpn_start_level: 0,
  head_dim: 256,
  head_kernel_size: 3,
  head_num_layers: 3,
  head_with_ln: True,
  regression_range: [[0, 4], [4, 8], [8, 16], [16, 32], [32, 64], [64, 10000]],
  use_abs_pe: True,
  use_rel_pe: False,
}
train_cfg: {
  init_loss_norm: 200,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
  label_smoothing: 0.1,
  dropout: 0.0,
  droppath: 0.1,
  loss_weight: 2.0,
}
test_cfg: {
  voting_thresh: 0.9,
  pre_nms_topk: 2000,
  max_seg_num: 100,
  min_score: 0.001,
  multiclass_nms: False,
  nms_sigma: 0.75,
  duration_thresh: 0.001,
  pre_nms_thresh: 0.001,
  iou_threshold: 0.1,
  nms_method: soft,
  ext_score_file: null,
}

# ── PPO + MoE configuration ─────────────────────────────────────────
ppo: {
  # agent architecture
  hidden_dim: 256,
  n_layers: 2,
  # state builder
  context_ratio: 0.25,
  boundary_ratio: 0.15,
  # PPO optimisation
  lr: 0.0003,
  ppo_epochs: 4,
  clip_eps: 0.2,
  vf_coef: 0.5,
  ent_coef: 0.01,
  gamma: 0.99,
  gae_lam: 0.95,
  max_grad_norm: 0.5,
  # environment
  topk: 5,
  max_steps: 20,
  delta: 1.0,
  n_aug: 3,
  # training
  epochs: 20,
  batch_episodes: 64,
  print_freq: 50,
  # reward weights
  reward: {
    lam_iou: 1.0,
    lam_be: 0.5,
    lam_step: 0.01,
    lam_invalid: 0.2,
    lam_stop: 0.5,
    stop_iou_thresh: 0.5,
  },
  # ── Role-aware MoE (set enable: false for ablation) ────────────
  moe: {
    enable: true,
    expert_hidden: 128,
    expert_out: 64,
    boundary_ratio: 0.15,
    context_ratio: 0.5,
    router_hidden: 32,
    temperature: 1.0,
  },
}

output_folder: ./ckpt/
