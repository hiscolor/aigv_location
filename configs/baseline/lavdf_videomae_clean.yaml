# ============================================================================
# Clean Baseline: LocPointTransformer + VideoMAE features
# No UMMAFormer innovations (no TFAA, no PCA-FPN, no cross-modal attention)
# Pure ActionFormer architecture with single-stream VideoMAE input
# ============================================================================

dataset_name: lavdf_videomae
train_split: ['train']
val_split: ['dev']
test_split: ['test']
dataset: {
  json_file: /home/lby/data/npy/metadata.min.json,
  feat_folder: /home/lby/data/npy/npy_features,
  file_prefix: null,
  file_ext: .npy,
  audio_feat_folder: null,
  audio_file_ext: null,
  num_classes: 1,
  input_dim: 1408,
  audio_input_dim: 0,
  feat_stride: 1,
  num_frames: 1,
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 768,
  force_upsampling: True,
}

# LocPointTransformer = pure ActionFormer (no UMMAFormer innovations)
model_name: LocPointTransformer
model: {
  backbone_type: convTransformer,
  fpn_type: identity,
  backbone_arch: [2, 2, 5],
  scale_factor: 2,
  max_buffer_len_factor: 1.0,
  n_mha_win_size: [7, 7, 7, 7, 7, -1],
  n_head: 4,
  embd_kernel_size: 3,
  embd_dim: 256,
  embd_with_ln: True,
  fpn_dim: 256,
  fpn_with_ln: True,
  fpn_start_level: 0,
  head_dim: 256,
  head_kernel_size: 3,
  head_num_layers: 3,
  head_with_ln: True,
  regression_range: [[0, 4], [4, 8], [8, 16], [16, 32], [32, 64], [64, 10000]],
  use_abs_pe: True,
  use_rel_pe: False,
}
opt: {
  type: AdamW,
  learning_rate: 0.001,
  epochs: 30,
  warmup: True,
  warmup_epochs: 5,
  weight_decay: 0.05,
  schedule_type: cosine,
}
loader: {
  batch_size: 16,
  num_workers: 4,
}
train_cfg: {
  init_loss_norm: 200,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
  label_smoothing: 0.1,
  dropout: 0.0,
  droppath: 0.1,
  loss_weight: 2.0,
}
test_cfg: {
  voting_thresh: 0.9,
  pre_nms_topk: 2000,
  max_seg_num: 100,
  min_score: 0.001,
  multiclass_nms: False,
  nms_sigma: 0.75,
  duration_thresh: 0.001,
  pre_nms_thresh: 0.001,
  iou_threshold: 0.1,
  nms_method: soft,
  ext_score_file: null,
}
output_folder: ./ckpt/
